<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给你的特别心意 | 信封电子贺卡</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 信封封面 -->
        <div class="envelope-cover" id="envelopeCover">
            <div class="seal">
                <i class="fas fa-heart"></i>
            </div>
            <div class="cover-content">
                <h1>致亲爱的你</h1>
                <p class="cover-subtitle">点击火漆印章开启</p>
                <p class="cover-hint">💌 这里有我想对你说的话</p>
            </div>
            <div class="cover-flap"></div>
        </div>

        <!-- 信封内页（打开后显示） -->
        <div class="envelope-content hidden" id="envelopeContent">
            <div class="card">
                <!-- 返回封面按钮 -->
                <button class="back-btn" id="backBtn">
                    <i class="fas fa-arrow-left"></i> 返回封面
                </button>

                <div class="header">
                    <h1><i class="fas fa-heart heart-icon"></i> 给最爱的你 <i class="fas fa-heart heart-icon"></i></h1>
                    <p>虽然我们相隔两地，但我的心永远和你在一起</p>
                </div>
                
                <!-- 花朵互动区域 -->
                <div class="flower-section">
                    <h3><i class="fas fa-seedling"></i> 点击花朵，飘落爱的花瓣</h3>
                    <div class="flower-area">
                        <div class="flower" id="mainFlower">
                            <div class="petal"></div>
                            <div class="petal"></div>
                            <div class="petal"></div>
                            <div class="petal"></div>
                            <div class="petal"></div>
                            <div class="petal"></div>
                            <div class="flower-center" id="flowerCenter"></div>
                            <div class="flower-stem"></div>
                            <div class="leaf leaf-1"></div>
                            <div class="leaf leaf-2"></div>
                        </div>
                        <div class="flowers-container" id="flowersContainer"></div>
                    </div>
                </div>

                <!-- 小作文区域（您的位置） -->
                <div class="essay-section">
                    <div class="section-header">
                        <h3><i class="fas fa-pen"></i> 想对你说的话</h3>
                        <div class="word-count">已输入 <span id="wordCount">0</span> 字</div>
                    </div>
                    <div class="essay-container">
                        <div class="essay-paper">
                            <div class="essay-lines">
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>
                            <textarea 
                                id="essayText" 
                                placeholder="在这里写下你想对TA说的话...&#10;&#10;（建议字数：200-500字）&#10;（您的文字会永久保存在这份贺卡中）"
                                maxlength="1000"
                            >亲爱的，虽然我们相隔千里，但距离从不会减少我对你的思念。

这束虚拟的玫瑰，代表我此刻想要送给你的心意。希望它能给你带来一丝甜蜜，就像你每天给我带来的温暖一样。

期待我们下次见面的日子，到那时，我一定会亲手送你一束真正的鲜花，给你一个大大的拥抱。

永远爱你的我 ❤️</textarea>
                        </div>
                    </div>
                </div>

                <!-- 原有的祝福语区域 -->
                <div class="message-section">
                    <h3><i class="fas fa-envelope-open"></i> 给你的祝福</h3>
                    <div class="message-area">
                        <p class="message-text">
                            距离不会让爱变淡，只会让思念更深。<br><br>
                            每一次分别，都是为了更好的重逢。<br><br>
                            愿我们的感情像这束花一样，永远鲜艳绽放。<br><br>
                            爱你，是我做过最正确的决定。
                        </p>
                    </div>
                </div>

                <!-- 已移除“异地恋小贴士”和“分享”区域 -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
